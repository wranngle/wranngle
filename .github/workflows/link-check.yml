name: link-check

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - '.github/workflows/link-check.yml'
  pull_request:
    paths:
      - 'README.md'
      - '.github/workflows/link-check.yml'
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 2
            --retry-wait-time 3
            --timeout 30
            --accept 200,206,429
            --exclude-path .git
            README.md
          fail: true
          output: ./lychee-report.md
          format: markdown

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee-report.md
          if-no-files-found: ignore
